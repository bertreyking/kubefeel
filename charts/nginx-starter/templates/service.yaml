apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubefeel-nginx-starter.fullname" . }}
  labels:
    {{- include "kubefeel-nginx-starter.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: {{ include "kubefeel-nginx-starter.name" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
