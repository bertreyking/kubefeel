apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubefeel-nginx-starter.fullname" . }}
  labels:
    {{- include "kubefeel-nginx-starter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: {{ include "kubefeel-nginx-starter.name" . }}
  template:
    metadata:
      labels:
        {{- include "kubefeel-nginx-starter.labels" . | nindent 8 }}
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
